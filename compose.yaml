services:
  postgres:
    image: postgres:16-alpine
    container_name: subscription-tracker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-subscription_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-subscription_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-subscription_tracker}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subscription_tracker} -d ${POSTGRES_DB:-subscription_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-subscription_tracker}:${POSTGRES_PASSWORD:-subscription_tracker}@postgres:5432/${POSTGRES_DB:-subscription_tracker}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "prisma:deploy", "--workspace", "@subscription-tracker/api"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-subscription_tracker}:${POSTGRES_PASSWORD:-subscription_tracker}@postgres:5432/${POSTGRES_DB:-subscription_tracker}?schema=public
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      INTERNAL_API_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
